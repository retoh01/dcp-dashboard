<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Light professional theme */
  --bg:#f2f5fa;--bg2:#ffffff;--card:#ffffff;--card2:#f6f8fd;--card3:#edf1f8;
  --border:#dde5f2;--border2:#c8d5ea;
  --text:#0e1829;--text2:#455270;--text3:#8896b2;
  --accent:#0e9f6e;--accent2:#057a55;--glow:rgba(14,159,110,0.12);
  --red:#e02424;--amber:#c27803;--green:#0e9f6e;--cyan:#0694a2;--purple:#6c2bd9;
  --red-dim:rgba(224,36,36,0.08);--amber-dim:rgba(194,120,3,0.1);
  --green-dim:rgba(14,159,110,0.1);--cyan-dim:rgba(6,148,162,0.1);--purple-dim:rgba(108,43,217,0.1);
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:54px;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0;z-index:100;box-shadow:0 1px 0 var(--border)}
.body{display:flex;flex:1;overflow:hidden}
.sidenav{width:196px;border-right:none;display:flex;flex-direction:column;padding:16px 0;flex-shrink:0;background:#1a2535;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
/* SIDEBAR NAV — dark sidebar, light text overrides */
.nav-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#3d5068;padding:12px 16px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;font-size:12px;color:#7a8ea8;transition:all .12s;border-left:2px solid transparent;margin:1px 0}
.nav-item:hover{background:rgba(255,255,255,.05);color:#c8d8ea}
.nav-item.active{background:rgba(14,159,110,.12);color:#34d399;border-left-color:#0e9f6e;font-weight:600}
.nav-num{width:24px;height:18px;border-radius:4px;background:rgba(255,255,255,.08);font-family:var(--mono);font-size:9px;font-weight:600;color:#4e6882;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.nav-item.active .nav-num{background:rgba(14,159,110,.2);color:#34d399}
.nav-divider{height:1px;background:rgba(255,255,255,.06);margin:10px 16px}
/* TOPBAR */
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#0e9f6e 0%,#057a55 100%);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:10px;color:#fff}
.logo-title{font-weight:700;font-size:14px;letter-spacing:-.02em;color:#0e1829}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.msw{display:flex;gap:2px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:3px}
.msw-btn{padding:4px 14px;border:none;border-radius:6px;font-size:10.5px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;background:transparent;color:var(--text3)}
.msw-btn.on{background:var(--accent);color:#fff;box-shadow:0 1px 6px rgba(14,159,110,.3)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#0e9f6e;box-shadow:0 0 7px rgba(14,159,110,.6);animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-family:var(--mono);font-size:11.5px;color:var(--text2)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#0e9f6e,#6c2bd9);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.topbar-sep{width:1px;height:22px;background:var(--border)}
/* PAGE HEADER */
.page-hdr{margin-bottom:22px}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em;color:var(--text)}
.page-sub{font-size:11.5px;color:var(--text3)}
/* KPI GRID */
.kpi-grid{display:grid;gap:12px;margin-bottom:20px}
.kpi-5{grid-template-columns:repeat(5,1fr)}
.kpi-4{grid-template-columns:repeat(4,1fr)}
.kpi-3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .15s,box-shadow .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.acc::before{background:linear-gradient(90deg,#0e9f6e,#34d399)}
.kpi.red::before{background:linear-gradient(90deg,#b91c1c,#e02424)}
.kpi.amb::before{background:linear-gradient(90deg,#92400e,#c27803)}
.kpi.grn::before{background:linear-gradient(90deg,#065f46,#0e9f6e)}
.kpi.cyn::before{background:linear-gradient(90deg,#164e63,#0694a2)}
.kpi.pur::before{background:linear-gradient(90deg,#4c1d95,#6c2bd9)}
.kpi-l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:7px}
.kpi-v{font-family:var(--mono);font-weight:700;line-height:1;color:var(--text)}
.kpi-s{font-size:10.5px;color:var(--text3);margin-top:6px;line-height:1.4}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--accent);flex-shrink:0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--card2);color:var(--text3);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--card2)}
.tbl tr.optimal td{background:rgba(14,159,110,.06);color:#057a55;font-weight:600}
/* BADGES */
.badge{display:inline-block;font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}
.badge-green{background:var(--green-dim);color:#057a55}
.badge-accent{background:var(--green-dim);color:#057a55}
.badge-cyan{background:var(--cyan-dim);color:var(--cyan)}
.badge-purple{background:var(--purple-dim);color:var(--purple)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;border:none;font-size:11.5px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#057a55}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b91c1c}
.btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--card3);border-color:var(--border2)}
/* BARS */
.bar-bg{height:6px;background:var(--card3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
/* SHAP WATERFALL */
.wf-bar{display:flex;align-items:center;margin-bottom:6px;gap:10px}
.wf-label{font-size:11px;color:var(--text2);width:150px;text-align:right;flex-shrink:0;font-weight:500}
.wf-track{flex:1;position:relative;height:20px;background:var(--card3);border-radius:3px}
.wf-center{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--border2)}
.wf-rect{position:absolute;top:0;height:100%;border-radius:2px;transition:width .5s ease}
.wf-val{font-family:var(--mono);font-size:10px;font-weight:700;width:52px;flex-shrink:0;text-align:left}
/* RISK ROWS */
.risk-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:background .12s;border:1px solid transparent}
.risk-row:hover{background:var(--card2)}
.risk-row.sel{background:var(--green-dim);border-color:rgba(14,159,110,.2)}
/* CHAT */
.msg-bot{max-width:92%;padding:10px 13px;border-radius:4px 10px 10px 10px;font-size:11.5px;line-height:1.6;background:var(--card2);border:1px solid var(--border);align-self:flex-start;color:var(--text)}
.msg-usr{max-width:92%;padding:10px 13px;border-radius:10px 4px 10px 10px;font-size:11.5px;line-height:1.6;background:var(--accent);color:#fff;align-self:flex-end}
.chat-input-row{display:flex;gap:6px;padding:10px 12px;border-top:1px solid var(--border)}
.ci{flex:1;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
.ci:focus{border-color:var(--accent)}
.cs{width:34px;height:34px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:15px;transition:background .15s}
.cs:hover{background:#057a55}
.typing span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--border2);animation:blink 1.2s ease infinite;margin:0 2px}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(14,24,41,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:500}
.ov-box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:30px;max-width:400px;width:90%;animation:popIn .22s ease;box-shadow:0 20px 60px rgba(0,0,0,.15)}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
/* STATUS */
.key-status{font-size:9.5px;color:var(--text3);font-family:var(--mono)}
.key-status.ok{color:var(--green)}
/* FORMS */
input,select,textarea{color:var(--text)!important;background:#fff!important;border:1px solid var(--border)!important;border-radius:8px!important;padding:8px 12px!important;font-size:12px!important;font-family:var(--sans)!important;outline:none!important;width:100%!important;transition:border-color .15s!important}
input:focus,select:focus,textarea:focus{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(14,159,110,.1)!important}
label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:4px;display:block}
.form-row{margin-bottom:12px}
a{text-decoration:none;color:var(--accent)}
</style>
</head>

function discountRecs(c,pct){
  const recs=[];
  if(c.contract==="Month-to-month"){
    const cost2y=c.monthly*0.15*24;const newPct=Math.max(pct-35,5);const lift=pct-newPct;const save=lift/100*c.monthly*24;const roi=Math.round((save-cost2y)/cost2y*100);
    recs.push({type:"2J-Vertrag −15%",target:"Monatsvertrag",cost:"CHF "+Math.round(cost2y),lift:lift+"%↓",clvSave:"CHF "+Math.round(save),roi:roi+"%",eligible:true,recommended:true});
    const cost1y=c.monthly*0.10*24;const newPct1=Math.max(pct-20,5);const lift1=pct-newPct1;const save1=lift1/100*c.monthly*24;const roi1=Math.round((save1-cost1y)/cost1y*100);
    recs.push({type:"1J-Vertrag −10%",target:"Monatsvertrag",cost:"CHF "+Math.round(cost1y),lift:lift1+"%↓",clvSave:"CHF "+Math.round(save1),roi:roi1+"%",eligible:true,recommended:false});
  }
  if(c.payment==="Electronic check"){
    const cost=60;const newPct=Math.max(pct-15,5);const lift=pct-newPct;const save=lift/100*c.monthly*24;const roi=Math.round((save-cost)/cost*100);
    recs.push({type:"Kreditkarte-Umstieg",target:"E-Check-Zahler",cost:"CHF 60 pausch.",lift:lift+"%↓",clvSave:"CHF "+Math.round(save),roi:roi+"%",eligible:true,recommended:false});
  }
  if(!c.techSup&&!c.onlSec&&c.internet!=="No"){
    const cost=c.monthly*0.08*24;const newPct=Math.max(pct-12,5);const lift=pct-newPct;const save=lift/100*c.monthly*24;const roi=Math.round((save-cost)/cost*100);
    recs.push({type:"Support-Paket −8%",target:"Kein Support",cost:"CHF "+Math.round(cost),lift:lift+"%↓",clvSave:"CHF "+Math.round(save),roi:roi+"%",eligible:true,recommended:false});
  }
  if(c.senior&&!c.partner&&!c.dep){
    const cost=c.monthly*0.12*24;const newPct=Math.max(pct-18,5);const lift=pct-newPct;const save=lift/100*c.monthly*24;const roi=Math.round((save-cost)/cost*100);
    recs.push({type:"Senior-Care −12%",target:"SeniorAlone",cost:"CHF "+Math.round(cost),lift:lift+"%↓",clvSave:"CHF "+Math.round(save),roi:roi+"%",eligible:true,recommended:false});
  }
  if(recs.length===0) recs.push({type:"Keine Rabatte verfügbar",eligible:false,recommended:false});
  return recs;
}

      <select onchange="dbContract=this.value;dbPage=0;render()" style="width:150px!important"><option value="all" ${dbContract==="all"?"selected":""}>Alle Verträge</option><option value="Month-to-month" ${dbContract==="Month-to-month"?"selected":""}>Month-to-month</option><option value="One year" ${dbContract==="One year"?"selected":""}>One year</option><option value="Two year" ${dbContract==="Two year"?"selected":""}>Two year</option></select>

      <tbody>${rows.map(c=>{

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo-mark">DCP</div>
      <div><div class="logo-title">Retention Cockpit</div><div class="logo-sub">Churn Intelligence · APM HSG 2026</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="display:flex;align-items:center;gap:5px"><div class="live-dot"></div><span style="font-size:9px;color:var(--green);font-weight:700;letter-spacing:.06em">LIVE</span></div>
      <div class="topbar-sep"></div>
      <div class="msw"><button class="msw-btn ${model==="rf"?"on":""}" onclick="model='rf';render()">Random Forest</button><button class="msw-btn ${model==="xgb"?"on":""}" onclick="model='xgb';render()">XGBoost</button></div>
      <div class="topbar-sep"></div>
      <span id="keyStatus" class="key-status ${gKey()?"ok":""}"> ${gKey()?"✓ "+gKey().slice(0,12)+"...":"Kein Key"}</span>
      <button onclick="showKeyModal()" style="font-size:9.5px;padding:4px 10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-family:var(--sans)">Key</button>
      <div class="topbar-sep"></div>
      <div class="clock" id="clk">${now.toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</div>
      <div class="avatar">MS</div>
    </div>
  </div>
  <div class="body">
    <div class="sidenav">
      <div class="nav-section">Navigation</div>
      ${navItems.map(item=>item===null?`<div class="nav-divider"></div>`:
        `<div class="nav-item ${page===item[0]?"active":""}" onclick="page='${item[0]}';render()"><div class="nav-num">${item[1]}</div><div><div style="line-height:1.3">${item[2]}</div>${item[3]?`<div style="font-size:9px;color:var(--text3);margin-top:1px">${item[3]}</div>`:""}</div></div>`
      ).join("")}
      <div style="flex:1"></div>
      <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,.07)">
        <div style="font-size:9px;color:#3d5068;line-height:1.8">IBM Telco · 7'043 Kunden<br>XGBoost AUC 0.841 · Recall 79.5%<br><span style="color:#2d3e50">Gruppe 12 · HSG 2026</span></div>
      </div>
    </div>
    <div class="main" id="mainContent">${pageContent}</div>
    <div style="width:282px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:#fff">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)">KI-Assistent</div>
        <div style="display:flex;align-items:center;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:var(--green)"></div><span style="font-size:9px;color:var(--green);font-weight:600">Online</span></div>
      </div>
      <div id="chatMsgs" style="flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px">
        ${chatMsgs.map(m=>`<div class="${m.r==="bot"?"msg-bot":"msg-usr"}">${m.t}</div>`).join("")}
        ${chatTyping?`<div class="msg-bot"><div class="typing"><span></span><span></span><span></span></div></div>`:""}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px;border-top:1px solid var(--border)">
        ${[["Risiko","Wer hat das höchste Risiko?"],["Discount","Bester Rabatt für aktuellen Kunden?"],["Wann?","Wann soll ich handeln?"],["KPIs","Erkläre die wichtigsten KPIs"],["Modell","Warum XGBoost statt RF?"],["SHAP","Wie funktioniert SHAP?"]].map(([l,q])=>`<button onclick="sc('${q}')" style="font-size:10px;padding:4px 9px;border-radius:5px;background:var(--card2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .12s" onmouseover="this.style.borderColor='var(--border2)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">${l}</button>`).join("")}
      </div>
      <div class="chat-input-row">
        <input class="ci" id="ci" placeholder="Frage stellen..." onkeydown="if(event.key==='Enter'){sc(this.value);this.value=''}">
        <button class="cs" onclick="const i=document.getElementById('ci');sc(i.value);i.value=''">↑</button>
      </div>
    </div>
  </div>
  ${showMailOv?`<div class="ov" onclick="if(mailStatus!=='sending'){showMailOv=false;mailStatus='idle';render()}"><div class="ov-box" onclick="event.stopPropagation()">
    ${mailStatus==="sending"?`<div style="font-size:32px;margin-bottom:10px">⏳</div><div style="font-family:var(--display);font-size:16px;font-weight:700;margin-bottom:6px">Mail wird gesendet...</div><div style="font-size:11px;color:var(--text3)">Bitte warten</div>`:""}
    ${mailStatus==="sent"?`<div style="font-size:32px;margin-bottom:10px">✅</div><div style="font-family:var(--display);font-size:16px;font-weight:700;margin-bottom:6px;color:var(--green)">Mail erfolgreich gesendet!</div><div style="font-size:11px;color:var(--text2);margin-bottom:12px">Die Retention-Mail wurde zugestellt.</div><div style="background:var(--card2);border-radius:7px;padding:10px;font-size:10px;color:var(--text3);margin-bottom:14px">An: ${selFinal.email}<br>CHF ${Math.round(selFinal.monthly*0.15*24)} Ersparnis · 6 Mt. Gratis-Support</div><button onclick="showMailOv=false;mailStatus='idle';render()" style="padding:8px 20px;background:var(--green);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--display)">Schliessen</button>`:""}
    ${mailStatus==="error"?`<div style="font-size:32px;margin-bottom:10px">❌</div><div style="font-family:var(--display);font-size:16px;font-weight:700;margin-bottom:6px;color:var(--red)">Fehler beim Senden</div><div style="font-size:11px;color:var(--text2);margin-bottom:8px">Fehlermeldung von EmailJS:</div><div style="background:var(--card2);border-radius:7px;padding:10px;font-size:10px;color:var(--red);font-family:var(--mono);margin-bottom:14px;word-break:break-all">${window._mailErr||'–'}</div><button onclick="showMailOv=false;mailStatus='idle';render()" style="padding:8px 20px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--display)">Schliessen</button>`:""}
  </div></div>`:""}
  `;
  setTimeout(()=>{const el=document.getElementById("chatMsgs");if(el)el.scrollTop=el.scrollHeight;},50);
}
setInterval(()=>{const el=document.getElementById("clk");if(el)el.textContent=new Date().toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit",second:"2-digit"});},1000);
if(!gKey())setTimeout(showKeyModal,800);
fetch("dashboard_data.json").then(r=>r.json()).then(d=>{allCustomers=d.customers;render();}).catch(()=>{});
render();
</script>
</body>
</html>
